version: '3.8'
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: pctrade-db
    environment:
      POSTGRES_DB: pctrade
      POSTGRES_USER: pctrade_user
      POSTGRES_PASSWORD: pctrade_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  minio:
    image: minio/minio
    container_name: pctrade-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
  redis:
    image: redis:7-alpine
    container_name: pctrade-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
  miniodata:
